spring.application.name=final-year-project

# H2 embedded file-based database - no external DB install needed.
# To switch to MySQL later, replace these 4 lines with your MySQL url/driver/credentials
# and add the mysql-connector-j dependency to pom.xml.
spring.datasource.url=jdbc:h2:file:./data/finalyearproject;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# H2 web console for viewing data during development: http://localhost:8080/h2-console
# JDBC URL to paste in: jdbc:h2:file:./data/finalyearproject
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

server.port=8080

# JWT
app.jwt.secret=ChangeThisToALongRandomSecretKeyForYourFinalYearProjectDemo123456
app.jwt.expiration-ms=86400000

logging.level.org.springframework.security=INFO

# ---------------------------------------------------------------------------
# AI features (dashboard insights, "Ask Your Journal" assistant, per-trade feedback)
# ---------------------------------------------------------------------------
# Works with OpenAI directly, or any OpenAI-compatible "chat completions" API
# (Groq, OpenRouter, a local Ollama server with its OpenAI-compatible endpoint, etc.)
# by changing base-url and model below. See README "AI Features" section for setup steps.
app.ai.enabled=true
app.ai.api-key=
app.ai.base-url=https://api.openai.com/v1
app.ai.model=gpt-4o-mini
